name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      # Pinned to 22.22.1 because 22.22.2 ships npm 10.9.7 which crashes
      # during self-upgrade to npm 11.x ("Cannot find module 'promise-retry'").
      # Fixed in npm 10.9.8 (npm/cli#9152) but not yet released in a Node 22.x
      # build. Track nodejs/node#62463 — once 22.22.3+ ships, switch back to 22.
      - uses: actions/setup-node@v6
        with:
          node-version: '22.22.1'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
